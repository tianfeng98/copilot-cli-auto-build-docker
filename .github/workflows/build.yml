name: Build and Push Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should-build: ${{ steps.check-build.outputs.should-build }}
    steps:
      - name: Get latest copilot-cli version
        id: get-version
        run: |
          VERSION=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/github/copilot-cli/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if image already exists on Docker Hub
        id: check-build
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/copilot-cli/tags/${VERSION}")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Image ${DOCKERHUB_USERNAME}/copilot-cli:${VERSION} already exists, skipping build."
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Image ${DOCKERHUB_USERNAME}/copilot-cli:${VERSION} not found, will build."
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    needs: check-version
    if: needs.check-version.outputs.should-build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            COPILOT_VERSION=${{ needs.check-version.outputs.version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/copilot-cli:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/copilot-cli:${{ needs.check-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/copilot-cli:latest
            ghcr.io/${{ github.repository_owner }}/copilot-cli:${{ needs.check-version.outputs.version }}
